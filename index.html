<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>La Maison - Tablet Order System | Modular Menu Slices</title>
    <!-- Socket.io client library (provided by server) -->
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* === PREMIUM AESTHETIC — UNCHANGED STRUCTURE === */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2C3E50; --secondary: #E8D5B7; --accent: #C17B57;
            --success: #27AE60; --danger: #E74C3C; --light: #ECF0F1;
            --dark: #1A1A1A; --text: #2C3E50; --shadow: rgba(0, 0, 0, 0.1);
        }
        body { font-family: 'Lato', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); color: var(--text); overflow-x: hidden; user-select: none; }
        .app-container { max-width: 1024px; height: 100vh; margin: 0 auto; background: white; display: flex; flex-direction: column; box-shadow: 0 0 50px var(--shadow); }
        .header { background: linear-gradient(135deg, var(--primary) 0%, #34495e 100%); color: white; padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2); position: relative; overflow: hidden; }
        .restaurant-name { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; letter-spacing: 1px; z-index: 1; }
        .table-info { font-size: 1.1rem; background: rgba(255, 255, 255, 0.15); padding: 0.5rem 1.5rem; border-radius: 50px; backdrop-filter: blur(10px); z-index: 1; }
        .nav-tabs { display: flex; background: var(--light); border-bottom: 3px solid var(--secondary); overflow-x: auto; scrollbar-width: none; }
        .nav-tab { flex: 1; min-width: 150px; padding: 1rem 1.5rem; background: transparent; border: none; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; position: relative; color: var(--text); }
        .nav-tab.active { background: white; color: var(--accent); }
        .nav-tab.active::after { content: ''; position: absolute; bottom: -3px; left: 0; right: 0; height: 3px; background: var(--accent); }
        .main-content { display: flex; flex: 1; overflow: hidden; }
        .menu-section { flex: 1; overflow-y: auto; padding: 2rem; }
        .category-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--primary); margin-bottom: 1.5rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--secondary); }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .menu-item { background: white; border: 2px solid var(--light); border-radius: 12px; overflow: hidden; transition: all 0.3s ease; display: flex; flex-direction: column; cursor: pointer; }
        .menu-item:hover { transform: translateY(-4px); box-shadow: 0 8px 25px var(--shadow); border-color: var(--accent); }
        .item-image { width: 100%; height: 180px; object-fit: cover; }
        .item-content { padding: 1.2rem; flex: 1; display: flex; flex-direction: column; }
        .item-name { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; }
        .item-description { font-size: 0.85rem; color: #666; margin-bottom: 1rem; flex: 1; }
        .item-footer { display: flex; justify-content: space-between; align-items: center; }
        .item-price { font-weight: 700; color: var(--accent); }
        .add-btn { background: var(--accent); color: white; border: none; padding: 0.5rem 1rem; border-radius: 50px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .add-btn:active { transform: scale(0.96); }
        .order-panel { width: 350px; background: #f8f9fa; border-left: 2px solid var(--secondary); display: flex; flex-direction: column; }
        .order-header { padding: 1.5rem; background: var(--primary); color: white; }
        .order-items { flex: 1; overflow-y: auto; padding: 1rem; }
        .order-item { background: white; padding: 1rem; border-radius: 8px; margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .order-summary { padding: 1.5rem; background: white; border-top: 2px solid var(--secondary); }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
        .summary-row.total { font-weight: 700; font-size: 1.2rem; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #eee; }
        .btn { width: 100%; padding: 1rem; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 0.5rem; transition: 0.2s; }
        .btn-primary { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 2rem; border-radius: 16px; width: 90%; max-width: 400px; text-align: center; }
        .payment-methods { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 1.5rem 0; }
        .payment-method { padding: 1rem; border: 2px solid #eee; border-radius: 10px; cursor: pointer; transition: 0.2s; font-weight: 500; }
        .payment-method.selected { border-color: var(--accent); background: #fdf8f5; }
        @media (max-width: 780px) { .order-panel { width: 280px; } .menu-section { padding: 1rem; } }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="restaurant-name">La Maison</div>
            <div class="table-info">Table #<span id="tableNumber">12</span></div>
        </div>

        <div class="nav-tabs">
            <button class="nav-tab active" data-category="appetizers">Appetizers</button>
            <button class="nav-tab" data-category="mains">Main Course</button>
            <button class="nav-tab" data-category="desserts">Desserts</button>
            <button class="nav-tab" data-category="drinks">Drinks</button>
        </div>

        <div class="main-content">
            <div class="menu-section" id="menuSection"></div>

            <div class="order-panel">
                <div class="order-header">
                    <h2>Current Order</h2>
                    <small>Items: <span id="itemCount">0</span></small>
                </div>
                <div class="order-items" id="orderItems">
                    <div style="text-align:center; padding: 2rem; color: #999;">Cart is empty</div>
                </div>
                <div class="order-summary">
                    <div class="summary-row"><span>Subtotal:</span><span id="subtotal">$0.00</span></div>
                    <div class="summary-row total"><span>Total:</span><span id="total">$0.00</span></div>
                    <button class="btn btn-danger" id="clearBtn">Clear All</button>
                    <button class="btn btn-primary" id="sendKitchenBtn">SEND TO KITCHEN</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div class="modal" id="confirmationModal">
        <div class="modal-content">
            <h2 style="color: var(--success);">✨ Order Sent!</h2>
            <p>Ticket #<span id="orderNumber">---</span> is now in the kitchen.</p>
            <button class="btn btn-primary" id="continueOrderBtn">➕ Add More</button>
            <button class="btn" style="background: var(--accent); color: white;" id="completeReservationBtn">💳 Pay Now</button>
        </div>
    </div>

    <!-- Payment Modal -->
    <div class="modal" id="paymentModal">
        <div class="modal-content">
            <h3>Complete Payment</h3>
            <h2 id="paymentTotalDisplay">$0.00</h2>
            <div class="payment-methods">
                <div class="payment-method" data-method="card">💳 Card Terminal</div>
                <div class="payment-method" data-method="cash">💵 Cash</div>
            </div>
            <button class="btn btn-primary" id="completePaymentBtn" disabled>Process Payment</button>
            <button class="btn btn-danger" onclick="document.getElementById('paymentModal').classList.remove('active')">Cancel</button>
        </div>
    </div>

    <script>
        // ===============================
        // MODULAR MENU SLICES
        // Each food category lives in an independent SLICE (data layer)
        // This respects the "divide categories into different slices" requirement
        // without altering UI/UX structure, persistence or layout.
        // ===============================

        // --- SLICE 1: APPETIZERS ---
        const appetizersSlice = [
            { id: 101, name: "Caesar Salad", price: 12.99, image: "https://images.unsplash.com/photo-1546793665-c74683f339c1?w=400", description: "Crispy romaine, parmesan, house dressing" },
            { id: 102, name: "Truffle Arancini", price: 14.50, image: "https://images.unsplash.com/photo-1541014741259-de529411b96a?w=400", description: "Crispy risotto balls, truffle aioli" },
            { id: 103, name: "Burrata Caprese", price: 15.90, image: "https://images.unsplash.com/photo-1579551603755-5d6b1b6b6b6b?w=400", description: "Creamy burrata, heirloom tomatoes, basil" }
        ];

        // --- SLICE 2: MAINS (Main Course) ---
        const mainsSlice = [
            { id: 201, name: "Grilled Salmon", price: 28.99, image: "https://images.unsplash.com/photo-1467003909585-2f8a72700288?w=400", description: "Lemon butter sauce, seasonal vegetables" },
            { id: 202, name: "Beef Tenderloin", price: 39.50, image: "https://images.unsplash.com/photo-1558030006-450675393462?w=400", description: "Herb crust, red wine reduction" },
            { id: 203, name: "Wild Mushroom Risotto", price: 22.50, image: "https://images.unsplash.com/photo-1476124369491-e7addf5db371?w=400", description: "Parmesan, truffle oil, fresh herbs" }
        ];

        // --- SLICE 3: DESSERTS ---
        const dessertsSlice = [
            { id: 301, name: "Tiramisu", price: 9.99, image: "https://images.unsplash.com/photo-1571877227200-a0d98ea607e9?w=400", description: "Classic Italian espresso dessert" },
            { id: 302, name: "Crème Brûlée", price: 8.50, image: "https://images.unsplash.com/photo-1470324161839-ce2bb6f2d8a6?w=400", description: "Vanilla bean, caramelized sugar" },
            { id: 303, name: "Dark Chocolate Lava", price: 10.50, image: "https://images.unsplash.com/photo-1606313564200-e75d5e30476c?w=400", description: "Molten center, vanilla gelato" }
        ];

        // --- SLICE 4: DRINKS ---
        const drinksSlice = [
            { id: 401, name: "Fresh Lemonade", price: 4.99, image: "https://images.unsplash.com/photo-1523677011781-c91d1bbe1f0e?w=400", description: "Hand-squeezed, mint infused" },
            { id: 402, name: "Aperol Spritz", price: 12.00, image: "https://images.unsplash.com/photo-1614313913007-2d4e2fd6b7e6?w=400", description: "Prosecco, Aperol, soda" },
            { id: 403, name: "Espresso Martini", price: 14.00, image: "https://images.unsplash.com/photo-1551024709-8f23befc8f87?w=400", description: "Vodka, fresh espresso, coffee liqueur" }
        ];

        // Combine slices into master catalog (preserves category mapping for rendering)
        // This object acts as a unified registry without merging the slices.
        const menuData = {
            appetizers: appetizersSlice,
            mains: mainsSlice,
            desserts: dessertsSlice,
            drinks: drinksSlice
        };

        // Global order state & socket
        const socket = io();
        let orderItems = [];
        let selectedPaymentMethod = null;

        // Helper: Flatten all items from all slices (for lookup by id)
        function getAllMenuItems() {
            return [...appetizersSlice, ...mainsSlice, ...dessertsSlice, ...drinksSlice];
        }

        // Render active category (keeps original dynamic rendering)
        function renderMenu(categoryKey) {
            const menuSection = document.getElementById('menuSection');
            const categoryItems = menuData[categoryKey];
            if (!categoryItems) return;

            const categoryTitle = categoryKey.charAt(0).toUpperCase() + categoryKey.slice(1);
            const gridHtml = `
                <h2 class="category-title">${categoryTitle}</h2>
                <div class="menu-grid">
                    ${categoryItems.map(item => `
                        <div class="menu-item" data-item-id="${item.id}">
                            <img src="${item.image}" class="item-image" alt="${item.name}" loading="lazy">
                            <div class="item-content">
                                <div class="item-name">${item.name}</div>
                                <div class="item-description">${item.description || ''}</div>
                                <div class="item-footer">
                                    <span class="item-price">$${item.price.toFixed(2)}</span>
                                    <button class="add-btn" data-id="${item.id}">Add</button>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            menuSection.innerHTML = gridHtml;

            // Attach event listeners to each "Add" button (delegation also works but direct for robustness)
            document.querySelectorAll('.add-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const itemId = parseInt(btn.dataset.id);
                    addToOrderById(itemId);
                });
            });
            // Also support clicking on the whole menu-item card for convenience
            document.querySelectorAll('.menu-item').forEach(card => {
                card.addEventListener('click', (e) => {
                    if (e.target.classList && e.target.classList.contains('add-btn')) return;
                    const btnInside = card.querySelector('.add-btn');
                    if (btnInside) {
                        const itemId = parseInt(btnInside.dataset.id);
                        addToOrderById(itemId);
                    }
                });
            });
        }

        // Add item to order by ID (uses master collection from slices)
        function addToOrderById(id) {
            const allItems = getAllMenuItems();
            const item = allItems.find(i => i.id === id);
            if (!item) return;

            const existing = orderItems.find(i => i.id === id);
            if (existing) {
                existing.quantity++;
            } else {
                orderItems.push({ ...item, quantity: 1 });
            }
            updateOrderUI();
        }

        // Refresh order panel, totals, counts
        function updateOrderUI() {
            const orderContainer = document.getElementById('orderItems');
            if (orderItems.length === 0) {
                orderContainer.innerHTML = '<div style="text-align:center; padding: 2rem; color: #999;">🛒 Cart is empty<br>Add delicious items from menu</div>';
            } else {
                orderContainer.innerHTML = orderItems.map(item => `
                    <div class="order-item">
                        <div style="flex:1">
                            <strong>${item.name}</strong> 
                            <span style="color:var(--accent); font-weight:600;"> x${item.quantity}</span>
                        </div>
                        <div style="font-weight:700;">$${(item.price * item.quantity).toFixed(2)}</div>
                        <button class="remove-item-btn" data-id="${item.id}" style="background:none; border:none; font-size:1.2rem; cursor:pointer; margin-left:8px; color:var(--danger);">🗑️</button>
                    </div>
                `).join('');
            }
            
            // Add remove functionality
            document.querySelectorAll('.remove-item-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const removeId = parseInt(btn.dataset.id);
                    const idx = orderItems.findIndex(i => i.id === removeId);
                    if (idx !== -1) {
                        if (orderItems[idx].quantity > 1) orderItems[idx].quantity--;
                        else orderItems.splice(idx, 1);
                        updateOrderUI();
                    }
                });
            });

            const subtotal = orderItems.reduce((sum, i) => sum + (i.price * i.quantity), 0);
            document.getElementById('subtotal').innerText = `$${subtotal.toFixed(2)}`;
            document.getElementById('total').innerText = `$${subtotal.toFixed(2)}`;
            document.getElementById('paymentTotalDisplay').innerText = `$${subtotal.toFixed(2)}`;
            const totalQty = orderItems.reduce((sum, i) => sum + i.quantity, 0);
            document.getElementById('itemCount').innerText = totalQty;
        }

        // Clear entire order
        function clearOrder() {
            if (orderItems.length && confirm("Clear all items from current order?")) {
                orderItems = [];
                updateOrderUI();
            } else if (orderItems.length === 0) {
                alert("No items to clear");
            }
        }

        // Send order to kitchen & trigger printer simulation
        function sendToKitchen() {
            if (orderItems.length === 0) {
                alert("Please add items to your order before sending.");
                return;
            }
            const totalAmount = orderItems.reduce((sum, i) => sum + (i.price * i.quantity), 0);
            const orderData = {
                table: document.getElementById('tableNumber').innerText,
                items: orderItems.map(i => ({ name: i.name, quantity: i.quantity, price: i.price })),
                total: `$${totalAmount.toFixed(2)}`,
                timestamp: new Date().toLocaleTimeString()
            };
            socket.emit('send-to-kitchen', orderData);
            // generate random 4-digit ticket number
            const ticket = Math.floor(1000 + Math.random() * 9000);
            document.getElementById('orderNumber').innerText = ticket;
            document.getElementById('confirmationModal').classList.add('active');
        }

        // --- Payment modal logic & terminal intent (unchanged but integrates slices)---
        function resetPaymentSelection() {
            selectedPaymentMethod = null;
            document.querySelectorAll('.payment-method').forEach(m => m.classList.remove('selected'));
            const completeBtn = document.getElementById('completePaymentBtn');
            if (completeBtn) completeBtn.disabled = true;
        }

        function attachPaymentEvents() {
            document.querySelectorAll('.payment-method').forEach(methodDiv => {
                methodDiv.onclick = () => {
                    document.querySelectorAll('.payment-method').forEach(x => x.classList.remove('selected'));
                    methodDiv.classList.add('selected');
                    selectedPaymentMethod = methodDiv.dataset.method;
                    document.getElementById('completePaymentBtn').disabled = false;
                };
            });
        }

        async function processPayment() {
            if (!selectedPaymentMethod) {
                alert("Please select a payment method.");
                return;
            }
            const totalAmount = orderItems.reduce((sum, i) => sum + (i.price * i.quantity), 0);
            if (totalAmount === 0 && orderItems.length === 0) {
                alert("No pending amount. Add items to order first.");
                return;
            }
            
            if (selectedPaymentMethod === 'card') {
                try {
                    const amountCents = Math.round(totalAmount * 100);
                    const response = await fetch('/create-terminal-intent', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ amount: amountCents })
                    });
                    if (!response.ok) throw new Error('Terminal request failed');
                    const data = await response.json();
                    if (data.client_secret) {
                        alert("💳 Please tap or insert card on the payment terminal now.");
                        // In real scenario, you'd wait for webhook; for demo, we assume success.
                    } else {
                        alert("Terminal activation signal sent. Complete payment on device.");
                    }
                } catch (err) {
                    console.warn("Terminal simulation error", err);
                    alert("Card terminal wake-up triggered (demo mode). Payment successful in simulation.");
                }
            } else if (selectedPaymentMethod === 'cash') {
                alert("💰 Cash payment recorded. Thank you!");
            }
            
            // Reset order after successful payment
            orderItems = [];
            updateOrderUI();
            resetPaymentSelection();
            document.getElementById('paymentModal').classList.remove('active');
            // Also close any existing confirmation if present
            document.getElementById('confirmationModal').classList.remove('active');
        }

        // ---------- EVENT LISTENERS & INITIALIZATION (preserve all original behaviors) ----------
        document.getElementById('clearBtn').addEventListener('click', clearOrder);
        document.getElementById('sendKitchenBtn').addEventListener('click', sendToKitchen);
        document.getElementById('continueOrderBtn').addEventListener('click', () => {
            document.getElementById('confirmationModal').classList.remove('active');
        });
        document.getElementById('completeReservationBtn').addEventListener('click', () => {
            document.getElementById('confirmationModal').classList.remove('active');
            if (orderItems.length === 0) {
                alert("No items to pay for. Please add items first.");
                return;
            }
            resetPaymentSelection();
            document.getElementById('paymentModal').classList.add('active');
        });
        document.getElementById('completePaymentBtn').addEventListener('click', processPayment);
        
        // Tab navigation (unchanged structure)
        const tabs = document.querySelectorAll('.nav-tab');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const category = tab.dataset.category;
                if (!category) return;
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                renderMenu(category);
            });
        });

        // Subtotal mirror fix: update subtotal display efficiently
        function syncSubtotal() {
            const subtotal = orderItems.reduce((sum, i) => sum + (i.price * i.quantity), 0);
            document.getElementById('subtotal').innerText = `$${subtotal.toFixed(2)}`;
        }
        
        // Override updateOrderUI to also update subtotal properly (already inside updateOrderUI, but ensure)
        const originalUpdate = updateOrderUI;
        window.updateOrderUI = updateOrderUI;
        
        // Attach payment method events after modal loads
        attachPaymentEvents();
        
        // initial render
        renderMenu('appetizers');
        updateOrderUI();
        
        // Optional: simulate socket events (kitchen receipt confirmation)
        socket.on('kitchen-confirmation', (msg) => {
            console.log("Kitchen received:", msg);
        });
        
        // Add to window for debugging, but ensures any external calls
        window.addToOrderById = addToOrderById;
        
        // Ensure that the menu rendering also keeps description visible & high end.
        // No structural changes: all menus, categories, order panel as original.
        // Also make sure that when order is sent we don't reset prematurely.
        
        // One more detail: replace missing menuItem "item-description" for slices that have description, but we explicitly added description fields
        // The CSS includes .item-description, it's fully compatible.
    </script>
</body>
</html>
